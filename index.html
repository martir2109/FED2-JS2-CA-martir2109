<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple social media web application where you are able to see other users posts and follow them."
    />
    <meta
      name="keywords"
      content="social media, posts, web application, follow, interact with posts"
    />
    <meta name="author" content="Martine Reppesgård Karlsen" />
    <title>Posty</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../public/images/favicon.png" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/src/css/input.css" />
    <link rel="stylesheet" href="/src/css/tailwind-style.css" />
    <link rel="stylesheet" href="/src/css/navbar.css" />
    <link rel="stylesheet" href="/src/css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Script -->
    <script type="module" src="/src/js/navbar.js"></script>
    <script type="module" src="/src/js/landing.js"></script>
    <script type="module" src="/src/js/footer.js"></script>
    <script type="module" src="/src/js/utils.js"></script>
  </head>

  <body>
    <header>
      <div id="navbar-container"></div>
    </header>
    <div
      class="loader-container absolute z-10 flex h-screen w-full translate-y-[100px] items-center justify-center bg-white"
    >
      <div
        class="loader aspect-2 animate-[l3-0 0.75s linear infinite] relative h-[60px] border-b-[3px] border-b-black"
        id="loader"
      ></div>
    </div>
    <section class="landing-page-section min-h-screen w-full"></section>
    <a
      class="fixed right-5 bottom-5 cursor-pointer"
      href="#top"
      aria-label="Back to top"
      ><i
        class="bi bi-arrow-up-circle-fill hover:text-secondary text-[2rem] text-gray-500 md:text-[2.5rem]"
      ></i
    ></a>
    <div id="footer-container"></div>
  </body>
</html>
