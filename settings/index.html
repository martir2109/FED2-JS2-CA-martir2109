<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posty || Settings</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/public/images/favicon.png" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/src/css/navbar.css" />
    <link rel="stylesheet" href="/src/css/input.css" />
    <link rel="stylesheet" href="/src/css/tailwind-style.css" />

    <!-- Script -->
    <script type="module" src="/src/js/utils.js"></script>
    <script type="module" src="/src/js/navbar.js"></script>
    <script type="module" src="/src/js/footer.js"></script>
    <script type="module" src="/src/js/settings/settings.js"></script>
  </head>
  <body class="h-full font-sans">
    <header>
      <div id="navbar-container"></div>
    </header>
    <div
      class="loader-container absolute z-10 flex h-screen w-full translate-y-[100px] items-center justify-center bg-white"
    >
      <div
        class="loader aspect-2 animate-[l3-0 0.75s linear infinite] relative h-[60px] border-b-[3px] border-b-black"
        id="loader"
      ></div>
    </div>
    <section
      class="border-box mb-[100px] flex min-h-screen w-full flex-col items-center justify-center gap-4 md:mt-2.5"
    >
      <div
        class="mb-6 flex w-full max-w-[600px] flex-col items-center justify-center pr-4 pl-4 sm:mx-auto"
      >
        <h1
          class="text-huge text-center text-2xl leading-9 font-medium tracking-tight text-black"
        >
          Settings
        </h1>
      </div>
      <form
        class="flex h-fit w-[90%] max-w-[562px] flex-col gap-9 rounded-md border border-gray-500 p-[30px] shadow-lg"
      >
        <div class="flex w-full flex-col gap-2">
          <label for="avatar" class="form-label"
            >Avatar <span class="note">(Square images preferred.)</span></label
          >
          <input
            id="avatar"
            type="url"
            class="text-tiny h-[50px] w-full rounded-xs border border-black p-2.5"
          />
        </div>

        <div class="flex w-full flex-col gap-2">
          <label for="bio" class="form-label">Bio </label>
          <input
            id="bio"
            class="text-tiny h-[50px] w-full rounded-xs border border-black p-2.5"
          />
        </div>
        <div class="edit-profile-container">
          <button
            type="button"
            class="bg-secondary hover:bg-primary flex h-[50px] w-full cursor-pointer items-center justify-center rounded-xs text-black hover:text-white"
            id="edit-profile-btn"
          >
            Update profile
          </button>
        </div>

        <div class="flex w-full flex-col gap-2">
          <label for="name" class="form-label">Name</label>
          <input
            id="name"
            class="text-tiny h-[50px] w-full rounded-xs border border-black p-2.5"
            disabled
          />
        </div>
        <div class="flex w-full flex-col gap-2">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            class="text-tiny h-[50px] w-full rounded-xs border border-black p-2.5"
            disabled
          />
        </div>
        <div class="flex w-full flex-col gap-2">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            class="text-tiny h-[50px] w-full rounded-xs border border-black p-2.5"
            type="password"
            disabled
          />
        </div>

        <button
          type="button"
          onclick="logout()"
          class="bg-primary hover:bg-secondary flex h-[50px] w-full cursor-pointer items-center justify-center rounded-xs text-white hover:text-black"
          id="logout-btn"
        >
          Log out
        </button>
      </form>
    </section>

    <div id="footer-container"></div>
  </body>
</html>
